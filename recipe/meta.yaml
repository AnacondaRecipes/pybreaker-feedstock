{% set name = "pybreaker" %}
{% set version = "1.4.1" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 8df2d245c73ba40c8242c56ffb4f12138fbadc23e296224740c2028ea9dc1178

build:
  number: 0
  script: python -m pip install . -vv --no-deps --no-build-isolation
  skip: true  # [py<39]

requirements:
  host:
    - pip
    - python
    - flit-core >=3.9
  run:
    - python

test:
  imports:
    - pybreaker
  commands:
    - pip check
  requires:
    - pip

about:
  home: http://github.com/danielfm/pybreaker
  summary: Python implementation of the Circuit Breaker pattern
  license: BSD-3-Clause
  license_file: LICENSE
  license_family: BSD
  description: |
    Python implementation of the Circuit Breaker pattern
  doc_url: https://github.com/danielfm/pybreaker/blob/main/README.rst
  dev_url: http://github.com/danielfm/pybreaker
